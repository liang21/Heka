version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: heka-postgres
    environment:
      POSTGRES_DB: heka
      POSTGRES_USER: heka
      POSTGRES_PASSWORD: heka_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heka"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: heka-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:

# NOTE: Milvus vector database will be added via docker-compose.override.yml
