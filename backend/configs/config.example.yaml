# Heka Backend Configuration Example
# Copy this file to config.yaml and update with your values
# Environment variables override values in this file (HEKA_ prefix)

database:
  host: localhost
  port: 5432
  user: heka
  password: heka
  dbname: heka
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

milvus:
  host: localhost
  port: 19530

jwt:
  secret: "change-this-to-a-random-32-character-string"
  access_token_ttl: 24h
  refresh_token_ttl: 168h

server:
  port: 8080
  allowed_origins:
    - http://localhost:3000
    - http://localhost:5173

ai:
  providers:
    - name: claude
      api_key: ""
      base_url: https://api.anthropic.com
      model: claude-3-5-sonnet-20241022
      priority: 1
      max_tokens: 4096
      temperature: 0.7

    - name: openai
      api_key: ""
      base_url: https://api.openai.com/v1
      model: gpt-4
      priority: 2
      max_tokens: 4096
      temperature: 0.7

    - name: ollama
      api_key: ""
      base_url: http://localhost:11434
      model: llama2
      priority: 3
      max_tokens: 2048
      temperature: 0.7

upload:
  max_size: 52428800  # 50MB in bytes
  allowed_types:
    - application/pdf
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - text/plain
    - text/markdown
    - image/png
    - image/jpeg
  storage_path: ./uploads
